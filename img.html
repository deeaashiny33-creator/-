<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الصور</title>
    <style>
        body { background: #0b0c10; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .img-container { display: flex; flex-direction: column; gap: 20px; max-width: 600px; margin: auto; }
        img { width: 100%; border-radius: 15px; border: 2px solid #ffcc00; }
        .back-btn { margin-top: 30px; padding: 15px; background: #ffcc00; border: none; border-radius: 10px; cursor: pointer; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <h1>صور الحساب</h1>
    <div class="img-container" id="gallery"></div>
    <button class="back-btn" onclick="history.back()">رجوع للمتجر</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const gallery = document.getElementById('gallery');
        for(let i=1; i<=4; i++) {
            let imgUrl = params.get('img'+i);
            if(imgUrl) {
                gallery.innerHTML += `<img src="${imgUrl}" alt="صورة ${i}">`;
            }
        }
    </script>
</body>
</html>
